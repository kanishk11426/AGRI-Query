<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --aurora-pink: #ff6b9d;
      --aurora-purple: #c44569;
      --aurora-blue: #667eea;
      --aurora-cyan: #4facfe;
      --aurora-green: #43e97b;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.8);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      color: var(--text-primary);
    }

    /* Animated Aurora Background */
    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: background 2s ease;
    }

    .aurora-bg.sunny {
      background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
    }

    .aurora-bg.rainy {
      background: linear-gradient(135deg, #485563 0%, #29323c 100%);
    }

    .aurora-bg.cloudy {
      background: linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%);
    }

    .aurora-bg.snowy {
      background: linear-gradient(135deg, #e6dada 0%, #274046 100%);
    }

    /* Animated particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      pointer-events: none;
      animation: float 8s infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) translateX(50px);
        opacity: 0;
      }
    }

    .rain-particle {
      width: 2px;
      height: 20px;
      background: linear-gradient(transparent, rgba(255, 255, 255, 0.6));
      border-radius: 50%;
      animation: rain 1s linear infinite;
    }

    @keyframes rain {
      to {
        transform: translateY(100vh);
      }
    }

    /* Glass morphism container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 2rem;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 48px 0 rgba(31, 38, 135, 0.5);
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--aurora-cyan), var(--aurora-pink));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Location Input */
    .location-section {
      margin-bottom: 2rem;
    }

    .search-container {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      color: var(--text-primary);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input[type="text"]:focus {
      background: rgba(255, 255, 255, 0.2);
      border-color: var(--aurora-cyan);
      box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
    }

    button {
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--aurora-blue), var(--aurora-purple));
      border: none;
      border-radius: 15px;
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
    }

    /* Current Weather */
    .current-weather {
      text-align: center;
      margin-bottom: 3rem;
    }

    .location-name {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .current-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .weather-icon {
      font-size: 8rem;
      margin: 1rem 0;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.2));
    }

    .temperature {
      font-size: clamp(4rem, 10vw, 6rem);
      font-weight: 700;
      margin: 1rem 0;
      background: linear-gradient(135deg, var(--aurora-cyan), var(--aurora-green));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .condition {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      text-transform: capitalize;
    }

    /* Weather Details Grid */
    .weather-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .detail-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .detail-card:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(1.05);
    }

    .detail-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .detail-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .detail-unit {
      font-size: 1rem;
      color: var(--text-secondary);
    }

    /* Forecast */
    .forecast-section {
      margin-top: 3rem;
    }

    .forecast-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
    }

    .forecast-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 1.5rem 1rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .forecast-card:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-5px);
    }

    .forecast-day {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .forecast-icon {
      font-size: 3rem;
      margin: 0.5rem 0;
    }

    .forecast-temps {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .temp-high {
      font-weight: 700;
      color: var(--text-primary);
    }

    .temp-low {
      color: var(--text-secondary);
    }

    /* Loading State */
    .loading {
      display: none;
      text-align: center;
      padding: 2rem;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      margin: 0 auto 1rem;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: var(--aurora-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error State */
    .error {
      display: none;
      text-align: center;
      padding: 2rem;
      background: rgba(255, 107, 157, 0.2);
      border: 1px solid var(--aurora-pink);
      border-radius: 20px;
      margin: 1rem 0;
    }

    .error.active {
      display: block;
    }

    .error-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Hidden State */
    .hidden {
      display: none !important;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .glass-card {
        padding: 1.5rem;
      }

      .search-container {
        flex-direction: column;
      }

      .weather-details {
        grid-template-columns: repeat(2, 1fr);
      }

      .forecast-grid {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="aurora-bg" id="auroraBg"></div>
  <div class="particles" id="particles"></div>

  <div class="container">
    <header>
      <h1>Aurora Weather</h1>
      <p class="subtitle">Real-time global weather forecast</p>
    </header>

    <main>
      <div class="glass-card location-section">
        <div class="search-container">
          <input
            type="text"
            id="cityInput"
            placeholder="Enter city name..."
            onkeypress="if(event.key==='Enter') searchCity()"
          >
          <button onclick="searchCity()">Search</button>
          <button class="btn-secondary" onclick="getCurrentLocation()">📍 Use My Location</button>
        </div>

        <div id="errorMessage" class="error">
          <div class="error-icon">⚠️</div>
          <p id="errorText"></p>
        </div>
      </div>

      <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p>Loading weather data...</p>
      </div>

      <div id="weatherContent" class="hidden">
        <div class="glass-card current-weather">
          <div class="location-name" id="locationName"></div>
          <div class="current-date" id="currentDate"></div>
          <div class="weather-icon" id="weatherIcon"></div>
          <div class="temperature" id="temperature"></div>
          <div class="condition" id="condition"></div>
        </div>

        <div class="glass-card">
          <div class="weather-details">
            <div class="detail-card">
              <div class="detail-label">Feels Like</div>
              <div class="detail-value" id="feelsLike">--</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">Humidity</div>
              <div class="detail-value" id="humidity">--</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">Wind Speed</div>
              <div class="detail-value" id="windSpeed">--</div>
            </div>
          </div>

          <div class="forecast-section">
            <h2 class="forecast-title">7-Day Forecast</h2>
            <div class="forecast-grid" id="forecastGrid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // WMO Weather Code Mapping
    const weatherCodes = {
      0: { description: 'Clear sky', icon: '☀️', type: 'sunny' },
      1: { description: 'Mainly clear', icon: '🌤️', type: 'sunny' },
      2: { description: 'Partly cloudy', icon: '⛅', type: 'cloudy' },
      3: { description: 'Overcast', icon: '☁️', type: 'cloudy' },
      45: { description: 'Foggy', icon: '🌫️', type: 'cloudy' },
      48: { description: 'Depositing rime fog', icon: '🌫️', type: 'cloudy' },
      51: { description: 'Light drizzle', icon: '🌦️', type: 'rainy' },
      53: { description: 'Moderate drizzle', icon: '🌦️', type: 'rainy' },
      55: { description: 'Dense drizzle', icon: '🌧️', type: 'rainy' },
      56: { description: 'Light freezing drizzle', icon: '🌧️', type: 'rainy' },
      57: { description: 'Dense freezing drizzle', icon: '🌧️', type: 'rainy' },
      61: { description: 'Slight rain', icon: '🌧️', type: 'rainy' },
      63: { description: 'Moderate rain', icon: '🌧️', type: 'rainy' },
      65: { description: 'Heavy rain', icon: '⛈️', type: 'rainy' },
      66: { description: 'Light freezing rain', icon: '🌧️', type: 'rainy' },
      67: { description: 'Heavy freezing rain', icon: '⛈️', type: 'rainy' },
      71: { description: 'Slight snow', icon: '🌨️', type: 'snowy' },
      73: { description: 'Moderate snow', icon: '🌨️', type: 'snowy' },
      75: { description: 'Heavy snow', icon: '❄️', type: 'snowy' },
      77: { description: 'Snow grains', icon: '🌨️', type: 'snowy' },
      80: { description: 'Slight rain showers', icon: '🌦️', type: 'rainy' },
      81: { description: 'Moderate rain showers', icon: '🌧️', type: 'rainy' },
      82: { description: 'Violent rain showers', icon: '⛈️', type: 'rainy' },
      85: { description: 'Slight snow showers', icon: '🌨️', type: 'snowy' },
      86: { description: 'Heavy snow showers', icon: '❄️', type: 'snowy' },
      95: { description: 'Thunderstorm', icon: '⛈️', type: 'rainy' },
      96: { description: 'Thunderstorm with slight hail', icon: '⛈️', type: 'rainy' },
      99: { description: 'Thunderstorm with heavy hail', icon: '⛈️', type: 'rainy' }
    };

    // Get weather code info
    function getWeatherInfo(code) {
      return weatherCodes[code] || { description: 'Unknown', icon: '❓', type: 'cloudy' };
    }

    // Format date
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric'
      });
    }

    // Create animated particles
    function createParticles(type) {
      const particlesContainer = document.getElementById('particles');
      particlesContainer.innerHTML = '';

      if (type === 'rainy') {
        for (let i = 0; i < 50; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle rain-particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.animationDelay = Math.random() * 2 + 's';
          particle.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
          particlesContainer.appendChild(particle);
        }
      } else if (type === 'snowy') {
        for (let i = 0; i < 30; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.width = (Math.random() * 5 + 3) + 'px';
          particle.style.height = particle.style.width;
          particle.style.animationDelay = Math.random() * 8 + 's';
          particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
          particlesContainer.appendChild(particle);
        }
      }
    }

    // Show error
    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      errorText.textContent = message;
      errorEl.classList.add('active');
      setTimeout(() => errorEl.classList.remove('active'), 5000);
    }

    // Show loading
    function showLoading(show) {
      const loading = document.getElementById('loadingState');
      loading.classList.toggle('active', show);
    }

    // Update UI with weather data
    function updateWeatherUI(data, locationName) {
      const current = data.current;
      const weatherInfo = getWeatherInfo(current.weathercode);

      // Update background based on weather
      const bg = document.getElementById('auroraBg');
      bg.className = 'aurora-bg ' + weatherInfo.type;

      // Create particles
      createParticles(weatherInfo.type);

      // Update current weather
      document.getElementById('locationName').textContent = locationName;
      document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      document.getElementById('weatherIcon').textContent = weatherInfo.icon;
      document.getElementById('temperature').textContent = Math.round(current.temperature_2m) + '°C';
      document.getElementById('condition').textContent = weatherInfo.description;
      document.getElementById('feelsLike').innerHTML = Math.round(current.apparent_temperature) + '<span class="detail-unit">°C</span>';
      document.getElementById('humidity').innerHTML = current.relativehumidity_2m + '<span class="detail-unit">%</span>';
      document.getElementById('windSpeed').innerHTML = Math.round(current.windspeed_10m) + '<span class="detail-unit">km/h</span>';

      // Update forecast
      const forecastGrid = document.getElementById('forecastGrid');
      forecastGrid.innerHTML = '';

      for (let i = 0; i < 7; i++) {
        const forecastInfo = getWeatherInfo(data.daily.weathercode[i]);
        const card = document.createElement('div');
        card.className = 'forecast-card';
        card.innerHTML = `
          <div class="forecast-day">${i === 0 ? 'Today' : formatDate(data.daily.time[i])}</div>
          <div class="forecast-icon">${forecastInfo.icon}</div>
          <div class="forecast-temps">
            <span class="temp-high">${Math.round(data.daily.temperature_2m_max[i])}°</span>
            <span class="temp-low">${Math.round(data.daily.temperature_2m_min[i])}°</span>
          </div>
        `;
        forecastGrid.appendChild(card);
      }

      // Show weather content
      document.getElementById('weatherContent').classList.remove('hidden');
    }

    // Fetch weather data
    async function fetchWeather(lat, lon, cityName) {
      showLoading(true);

      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m,apparent_temperature&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`;

        const response = await fetch(url);
        if (!response.ok) throw new Error('Failed to fetch weather data');

        const data = await response.json();
        updateWeatherUI(data, cityName);
      } catch (error) {
        showError('Failed to load weather data. Please try again.');
        console.error('Weather fetch error:', error);
      } finally {
        showLoading(false);
      }
    }

    // Get current location
    async function getCurrentLocation() {
      if (!navigator.geolocation) {
        showError('Geolocation is not supported by your browser');
        return;
      }

      showLoading(true);

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          // Get city name from coordinates
          try {
            const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
            const data = await response.json();
            const cityName = data.city || data.locality || 'Your Location';
            await fetchWeather(lat, lon, cityName);
          } catch (error) {
            await fetchWeather(lat, lon, 'Your Location');
          }
        },
        (error) => {
          showLoading(false);
          if (error.code === error.PERMISSION_DENIED) {
            showError('Location access denied. Please enter a city name manually.');
          } else {
            showError('Unable to retrieve your location. Please try entering a city name.');
          }
        }
      );
    }

    // Search city
    async function searchCity() {
      const cityInput = document.getElementById('cityInput');
      const cityName = cityInput.value.trim();

      if (!cityName) {
        showError('Please enter a city name');
        return;
      }

      showLoading(true);

      try {
        // Geocoding API to get coordinates
        const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1`;
        const geoResponse = await fetch(geoUrl);

        if (!geoResponse.ok) throw new Error('Failed to search city');

        const geoData = await geoResponse.json();

        if (!geoData.results || geoData.results.length === 0) {
          showError('City not found. Please try another name.');
          showLoading(false);
          return;
        }

        const location = geoData.results[0];
        const displayName = location.country ? `${location.name}, ${location.country}` : location.name;
        await fetchWeather(location.latitude, location.longitude, displayName);
      } catch (error) {
        showError('Failed to search city. Please try again.');
        console.error('City search error:', error);
        showLoading(false);
      }
    }

    // Initialize - try to get current location on load
    window.addEventListener('load', () => {
      // Create initial particles
      createParticles('cloudy');

      // Auto-load location if available
      getCurrentLocation();
    });
  </script>
</body>
</html>
